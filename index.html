<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundinity — Find. Match. Build.</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #ede8df;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .screen {
      width: 100vw; height: 100vh;
      background: #ede8df;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 80px;
    }

    /* ── Progress pills ── */
    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 36px;
    }
    .pill {
      width: 73px; height: 12px;
      border-radius: 40px;
      background: #0f172a;
    }
    .pill.inactive { opacity: 0.35; }

    /* ── Headline ── */
    .headline {
      font-size: 38px;
      font-weight: 600;
      color: #000;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .subline {
      font-size: 24px;
      font-weight: 400;
      color: #000;
      text-align: center;
      margin-bottom: 0;
    }

    /* ── Blobs ── */
    .blobs {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 18px;
      margin: 32px 0 40px;
    }

    .blob {
      background: #cdc7b8;
    }

    /* Side blobs — smaller */
    .blob-side {
      width: 148px;
      height: 172px;
      border-radius: 50% 44% 52% 46% / 55% 48% 58% 50%;
      transform: rotate(-6deg);
    }
    .blob-side.right {
      transform: rotate(8deg);
    }

    /* Center blob — larger */
    .blob-center {
      width: 200px;
      height: 234px;
      border-radius: 46% 54% 44% 56% / 52% 46% 60% 48%;
      margin-bottom: 10px;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 307px;
      height: 54px;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { opacity: 0.75; transform: scale(0.99); }

    .btn-dark {
      background: #151a1a;
      color: #f2e3cf;
    }
    .btn-outline {
      background: transparent;
      color: #000;
      border: 2px solid #000;
    }

    .btn-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    /* LinkedIn icon */
    .icon-linkedin {
      background: #0a66c2;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-linkedin svg { width: 14px; height: 14px; fill: #fff; }

    /* Google icon */
    .icon-google {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
    .icon-google svg { width: 14px; height: 14px; }

    /* ── Fine print ── */
    .fine-print {
      font-size: 14px;
      font-weight: 400;
      color: #4c4c4c;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
    .fine-print a {
      font-weight: 700;
      color: #4c4c4c;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="screen">

  <!-- Progress pills -->
  <div class="progress">
    <div class="pill"></div>
    <div class="pill inactive"></div>
    <div class="pill inactive"></div>
  </div>

  <!-- Headline -->
  <h1 class="headline">Find. Match. Build</h1>
  <p class="subline">Lorem Ipsum</p>

  <!-- Blobs -->
  <div class="blobs">
    <div class="blob blob-side left"></div>
    <div class="blob blob-center"></div>
    <div class="blob blob-side right"></div>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <a href="screen2.html" class="btn btn-dark">
      <span class="btn-icon icon-linkedin">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </span>
      Continue with LinkedIn
    </a>

    <a href="screen2.html" class="btn btn-dark">
      <span class="btn-icon icon-google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </span>
      Continue with Google
    </a>

    <a href="screen2.html" class="btn btn-outline">
      Sign Up with Email
    </a>
  </div>

  <!-- Fine print -->
  <p class="fine-print">
    By continuing, you acknowledge that you understand and agree to the
    <a href="#">TnC</a> and <a href="#">Privacy policy</a>
  </p>

</div>

</body>
</html>
